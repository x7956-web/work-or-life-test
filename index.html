<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="32题测出你该换工作，还是换活法。" />
    <meta name="theme-color" content="#111827" />
    <title>你该换工作，还是换活法？</title>
    <style>
      :root{--accent:#2563eb;--ink:#111827;--muted:#64748b;--soft:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--soft)}
      *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#e8f0ff,transparent 36rem),var(--soft)}button{font:inherit}.shell{width:min(100%,720px);margin:0 auto;min-height:100vh;padding:18px 16px 36px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}.brand{display:inline-flex;align-items:center;gap:9px;font-weight:800}.reset-btn{border:0;background:transparent;cursor:pointer}.mark{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;color:#fff;background:var(--accent)}.top-note,.eyebrow,.small-note,.notice{color:var(--muted);font-size:13px}.view{display:grid;gap:18px}.cover{min-height:calc(100vh - 90px);align-items:center}.cover-panel,.question-card{border:1px solid rgba(148,163,184,.35);border-radius:18px;background:rgba(255,255,255,.88);box-shadow:0 24px 60px rgba(15,23,42,.08)}.cover-panel{padding:30px 24px}.eyebrow{text-transform:uppercase;letter-spacing:.08em;font-weight:800}h1,h2,h3,p{margin-top:0}.cover-panel h1{margin:12px 0;font-size:clamp(32px,8vw,52px);line-height:1.06}.cover-subtitle{color:#334155;font-size:17px;line-height:1.75}.solid-btn{min-height:48px;border-radius:999px;border:1px solid transparent;padding:0 22px;cursor:pointer;font-weight:800;color:#fff;background:var(--accent);box-shadow:0 16px 28px rgba(37,99,235,.24)}
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
